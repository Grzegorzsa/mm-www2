<h3 id="page-buttons">Page Buttons</h3>
<p>
  The column of <strong>8 page buttons</strong> on the right side of the grid lets you switch
  between pages. Each page provides 64 slots, giving a total of <strong>512 slots</strong> across
  all 8 pages. The active page button is <strong>light blue</strong>; inactive pages are gray.
</p>
